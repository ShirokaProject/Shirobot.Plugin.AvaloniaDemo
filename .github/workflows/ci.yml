name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  PUBLISH_DIR: bin/Release/net10.0/publish

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Publish
        run: dotnet publish --configuration Release --no-restore

      - name: Verify Plugin Package
        run: bash .github/scripts/verify-publish.sh "$PUBLISH_DIR" ShiroBot.AvaloniaDemoPlugin.dll
