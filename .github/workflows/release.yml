name: Build Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag name, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: write

env:
  PROJECT_DIR: .
  PUBLISH_DIR: bin/Release/net10.0/publish

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout ShiroBot SDK source
        uses: actions/checkout@v4
        with:
          repository: ShirokaProject/ShiroBot
          path: shirobot-core
          ref: master

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Pack current SDK
        run: |
          dotnet pack shirobot-core/ShiroBot.Model/ShiroBot.Model.csproj -c Release -o artifacts/nuget
          dotnet pack shirobot-core/ShiroBot.SDK/ShiroBot.SDK.csproj -c Release -o artifacts/nuget
          dotnet pack shirobot-core/ShiroBot.AvaloniaSdk/ShiroBot.AvaloniaSdk.csproj -c Release -o artifacts/nuget

      - name: Restore
        run: >-
          dotnet restore ShiroBot.AvaloniaDemoPlugin.csproj
          -p:UseLocalShiroBotSdk=false
          --source artifacts/nuget
          --source https://api.nuget.org/v3/index.json

      - name: Publish
        run: dotnet publish ShiroBot.AvaloniaDemoPlugin.csproj --configuration Release --no-restore -p:UseLocalShiroBotSdk=false

      - name: Verify Plugin Package
        run: bash .github/scripts/verify-publish.sh "$PUBLISH_DIR" ShiroBot.AvaloniaDemoPlugin.dll

      - name: Collect Plugin DLL
        shell: bash
        run: |
          PLUGIN_DLL="$PUBLISH_DIR/ShiroBot.AvaloniaDemoPlugin.dll"
          if [ ! -f "$PLUGIN_DLL" ]; then
            echo "Plugin DLL not found: $PLUGIN_DLL"
            ls -la "$PUBLISH_DIR"
            exit 1
          fi
          mkdir -p release
          cp "$PLUGIN_DLL" release/

      - name: Upload DLL to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          target_commitish: ${{ github.sha }}
          files: release/*.dll
